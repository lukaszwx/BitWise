<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BitWise — Conversor de Dados</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="app">

    <!-- HEADER -->
    <header class="app-header">
        <div class="logo">
            <svg class="bitwise-logo" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" opacity="0.2"/>
                <text x="50" y="55" text-anchor="middle" font-size="22" font-weight="600">BW</text>
            </svg>
            <div>
                <h1>BitWise</h1>
                <span>Conversor de dados</span>
            </div>
        </div>
    </header>

    <!-- CONVERTER -->
    <section class="converter">

        <div class="field">
            <label>Valor</label>
            <input type="number" id="inputValor" placeholder="Digite um valor..." min="0">
        </div>

        <div class="field">
            <label>Converter de</label>
            <select id="unidadeOrigem">
                <option value="1">Bytes (B)</option>
                <option value="1024">Kilobytes (KB)</option>
                <option value="1048576">Megabytes (MB)</option>
                <option value="1073741824">Gigabytes (GB)</option>
                <option value="1099511627776">Terabytes (TB)</option>
            </select>
        </div>

        <button class="btn-convert" id="convertBtn">
            Converter
        </button>

        <div id="resultadoArea" class="results">
            <span class="placeholder">Resultado aparecerá aqui</span>
        </div>

    </section>

</main>

<footer class="footer">
    Desenvolvido por Lucas
</footer>

<script src="script.js"></script>

</body>
</html>
